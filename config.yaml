# ============================================================
#  Hackathon Scout configuration
#  Everything here is safe to edit — no code changes needed.
# ============================================================

# An event is kept if its title/themes/context contains ANY of these
# (case-insensitive substring match; German included since you're DE-based).
keywords:
  # --- pharma & drug discovery ---
  - pharma              # pharma, pharmaceutical
  - drug discovery
  - drug design
  - therapeutic
  - medicinal chem      # medicinal chemistry
  - small molecule
  - lead optimization
  - virtual screening
  - admet
  - qsar
  - cheminformatic
  - chemoinformatic
  - computational chem  # computational chemistry

  # --- protein & structural biology ---
  - protein             # protein design/engineering/folding/structure
  - alphafold
  - de novo             # de novo protein / drug
  - binder design
  - enzyme
  - antibody
  - structural biolog
  - structure prediction

  # --- molecule / molecular design ---
  - molecul             # molecule, molecular design/dynamics/generation
  - retrosynthesis
  - generative chem     # generative chemistry
  - docking             # molecular docking

  # --- AI in biology / techbio ---
  - techbio
  - ai drug
  - ai for bio
  - ai in bio
  - generative biolog

  # --- computational biology & genomics ---
  - computational biolog
  - comp bio
  - bioinformatic
  - systems biolog
  - omics
  - genom               # genome, genomics
  - proteom             # proteome, proteomics
  - transcriptom
  - metabolom
  - single cell
  - single-cell
  - in silico

  # --- broader bio / life-science umbrella ---
  - synthetic biolog
  - synbio
  - bioengineering
  - biotech             # biotech, biotechnology
  - life science
  - lifescience

  - health          # healthcare, healthtech, digital health, mental health...
  - gesundheit
  - medical
  - medicine
  - medizin
  - medtech
  - med-tech
  - biomed
  - biotech
  - biolog          # biology, biological
  - bioinformatic
  - biohack
  - synbio
  - life science
  - lifescience
  - clinical
  - klinik
  - hospital
  - kranken         # Krankenhaus, Krankenversicherung
  - pflege
  - patient
  - diagnos         # diagnosis, diagnostics
  - oncolog
  - onkolog
  - radiolog
  - cardio
  - kardio
  - neuro
  - surgery
  - surgical
  - dental
  - vaccine
  - epidemi
  - public health
  - telemedi
  - ehealth
  - e-health
  - longevity
  - fhir            # health-IT interoperability standard — strong signal
  - dicom

  # --- disease / therapy vocabulary (esp. Kaggle-style titles) ---
  - cancer
  - tumor               # tumor / tumour
  - tumour
  - disease
  - crispr
  - dna
  - immuno              # immunology / immunotherapy
  - biomarker
  - microscop           # microscopy / microscope
  - gene therapy
  - gene editing
  - cell therapy

# Anything containing these is dropped even if a keyword matched.
exclude_keywords: []
#  e.g. [blockchain, web3] if you never want those

# Words that mark something as an *event* (used for the web sweep and
# any listing page with must_contain: EVENT_WORDS-style filtering).
event_words: [hackathon, hackaton, datathon, makeathon, hacks, hacking, "hack:"]

# ------------------------------------------------------------
# Source 1: Devpost (JSON API) — one query per term below
# ------------------------------------------------------------
devpost_search_terms: [health, medical, bio, pharma, clinical, genomics]

# ------------------------------------------------------------
# Source 2b: grand-challenge.org — public REST API, all biomedical
# imaging challenges. true/false toggle.
# ------------------------------------------------------------
grand_challenge: true

# ------------------------------------------------------------
# Source 2c: Kaggle competitions API — one query per term below.
# Only active if KAGGLE_USERNAME + KAGGLE_KEY secrets are set
# (kaggle.com -> Settings -> API -> Create New Token).
# ------------------------------------------------------------
kaggle_search_terms: [health, medical, biology, drug, protein, rna]

# ------------------------------------------------------------
# Source 3: Aggregator listing pages (generic link harvester).
#   link_contains  -> only keep <a> tags whose href contains this
#   must_contain   -> anchor text must contain one of these words
#   trusted: true  -> skip the keyword filter (page is already topic-filtered)
# ------------------------------------------------------------
listing_pages:
  - name: "AllHackathons (health theme)"
    url: "https://allhackathons.com/themes/health/"
    link_contains: "/hackathon/"
    trusted: true

  - name: "digital-health-events.de (Germany)"
    url: "https://digital-health-events.de/"
    link_contains: "utm_source=digital-health-events.de"
    must_contain: [hackathon, datathon, makeathon, "hack:", hacking]

  # Add more here — a plain HTML page with real <a> links is required.
  # (hackathon-base.org, lu.ma, Eventbrite, MIT Hacking Medicine, EIT Health
  #  are JavaScript-rendered / API-less -> covered by web_queries below.)

# ------------------------------------------------------------
# Source 4: Web sweep via DuckDuckGo ({year} is filled automatically).
# Entries are a plain string, or a mapping with flags:
#   q:       the query (site:xyz restricts to one domain)
#   loose:   don't require an event word (hackathon/datathon/...) in the
#            result title — for programs that avoid the word "hackathon"
#   trusted: skip the keyword relevance filter (domain/query is already
#            on-topic); the Claude filter still prunes non-event pages
# ------------------------------------------------------------
web_queries:
  - "healthcare hackathon {year}"
  - "digital health hackathon {year} Europe"
  - "biotech hackathon {year}"
  - "pharma hackathon {year}"
  - "bioinformatics hackathon {year}"
  - "medical AI hackathon {year} Germany"

  # --- event platforms (JS-rendered / no public search API) ---
  - "site:eventbrite.com health hackathon {year}"
  - "site:eventbrite.com biotech OR medical hackathon"
  - "site:lu.ma health OR biotech hackathon"
  - {q: "site:hackathon-base.org health OR medical OR bio", loose: true}

  # --- curated organizers (all-health domains -> trusted) ---
  - {q: "site:hackingmedicine.mit.edu {year}", loose: true, trusted: true}
  - {q: "site:eithealth.eu hackathon OR bootcamp OR challenge {year}", loose: true, trusted: true}

  # --- corporate innovation programs (no "hackathon" in titles -> loose) ---
  - {q: "site:g4a.health {year}", loose: true, trusted: true}
  - {q: "Bayer G4A digital health partnerships {year}", loose: true, trusted: true}
  - {q: "Novartis BIOME challenge {year}", loose: true, trusted: true}
  - {q: "Roche healthcare innovation challenge OR hackathon {year}", loose: true, trusted: true}

# ------------------------------------------------------------
# Optional: let Claude drop false positives before notifying.
# Only active if the ANTHROPIC_API_KEY env var / secret is set.
# ------------------------------------------------------------
llm_filter: true
llm_model: claude-haiku-4-5

# ------------------------------------------------------------
# Filtering: drop events that have already finished. Undated
# events are always kept (can't prove they're over). Bare domain
# roots (aggregator homepages) are dropped automatically.
# ------------------------------------------------------------
drop_past_events: true
past_grace_days: 1   # keep events that ended within this many days (timezones/multi-day)

# ------------------------------------------------------------
# Reminders — days before a date on which to ping you in chat.
# DISABLED for now (per setup: chat gets new finds only, name + link;
# deadlines live in the Notion table). Re-enable with e.g. [3] / [7].
# ------------------------------------------------------------
remind_days_before_deadline: []
remind_days_before_start: []

# ------------------------------------------------------------
# Catalog housekeeping: drop events from events.json once they
# ended more than N days ago (undated entries: last sighting).
# ------------------------------------------------------------
prune_days: 120