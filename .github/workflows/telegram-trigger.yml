name: Telegram scan trigger

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Telegram and trigger scan on /scan command
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from datetime import datetime, timezone

          token  = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          gh_token = os.environ["GH_TOKEN"]
          repo   = os.environ["GITHUB_REPOSITORY"]
          ref    = os.environ["GITHUB_REF_NAME"]
          headers = {
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/vnd.github+json",
          }

          # Fetch up to 100 pending Telegram updates (no offset = all unconfirmed)
          upd_r = requests.get(
              f"https://api.telegram.org/bot{token}/getUpdates",
              params={"limit": 100, "allowed_updates": ["message"]},
              timeout=30,
          )
          updates = upd_r.json().get("result", [])

          # Find the most recent /scan from our chat
          scan_msg = None
          for upd in reversed(updates):
              msg = upd.get("message", {})
              if (str(msg.get("chat", {}).get("id", "")) == chat_id
                      and msg.get("text", "").strip().lower().startswith("/scan")):
                  scan_msg = msg
                  break

          if not scan_msg:
              print(f"No /scan command in {len(updates)} updates.")
              exit(0)

          scan_ts = scan_msg["date"]
          print(f"Found /scan at unix={scan_ts}")

          # Skip if a scan workflow was already triggered AFTER this /scan message
          runs_r = requests.get(
              f"https://api.github.com/repos/{repo}/actions/workflows/scan.yml/runs",
              headers=headers,
              params={"per_page": 5},
              timeout=30,
          )
          for run in runs_r.json().get("workflow_runs", []):
              run_ts = datetime.fromisoformat(
                  run["created_at"].replace("Z", "+00:00")
              ).timestamp()
              if run_ts > scan_ts:
                  print(f"Scan already triggered after /scan (run {run['id']}). Skipping.")
                  exit(0)

          # Trigger the scan workflow
          r = requests.post(
              f"https://api.github.com/repos/{repo}/actions/workflows/scan.yml/dispatches",
              headers=headers,
              json={"ref": ref},
              timeout=30,
          )
          if r.status_code == 204:
              print("Scan dispatched.")
              requests.post(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data={"chat_id": chat_id,
                        "text": "🔍 Scan triggered! Results arriving in ~2 min."},
                  timeout=30,
              )
          else:
              print(f"Dispatch failed: {r.status_code} {r.text}")
          PYEOF