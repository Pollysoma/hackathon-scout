name: Hackathon scan

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC = 08:00 Munich (summer)
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed to commit seen.json back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent.py

      - name: Persist state (seen.json + latest digest)
        run: |
          git config user.name "hackathon-scout[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json latest_digest.md 2>/dev/null || true
          git diff --cached --quiet && echo "No new events to persist." && exit 0
          git commit -m "chore: update seen events ($(date -u +%F))"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
