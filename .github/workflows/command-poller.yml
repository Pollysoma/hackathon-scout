name: Command poller (/search, /all)

# Checks TELEGRAM every 5 minutes for commands. Discord has no commands —
# it only receives the daily 12:00-Munich digest pushed by scan.yml.
#   /search  -> triggers the "Hackathon scan" workflow with channels=telegram
#               (results of that scan arrive in the Telegram chat only)
#   /all     -> replies immediately with every known upcoming hackathon

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write   # needed to dispatch scan.yml
  contents: read

concurrency:
  group: command-poller
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Poll for commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python poller.py